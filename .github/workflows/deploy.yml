name: Deploy to Production

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Deploy to deploy branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          REMOTE="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          
          # Klonuj deploy branch (albo utwórz jeśli nie istnieje)
          git clone --single-branch --branch deploy "$REMOTE" deploy-dir 2>/dev/null || {
            mkdir deploy-dir && cd deploy-dir && git init && git checkout -b deploy && git remote add origin "$REMOTE" && cd ..
          }
          
          # Wyczyść starą zawartość i wrzuć nowy build
          cd deploy-dir
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          cp -r ../out/. .
          printf '%s\n' '---' 'deployment:' '  tasks:' '    - /bin/cp -rf /home/petrasky/repositories/czarkom/. /home/petrasky/public_html/czarkom/www/' > .cpanel.yml
          
          git add -A
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" --allow-empty
          git push origin deploy
