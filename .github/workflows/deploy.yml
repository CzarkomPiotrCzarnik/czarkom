name: Deploy to Production

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Deploy to deploy branch
        run: |
          REMOTE="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          # Clone deploy branch (or create if first time)
          if git ls-remote --heads "$REMOTE" deploy | grep -q deploy; then
            git clone --branch deploy --single-branch "$REMOTE" deploy-dir
          else
            mkdir deploy-dir && cd deploy-dir && git init && git checkout -b deploy && git remote add origin "$REMOTE" && cd ..
          fi
          
          # Clear old files (keep .git)
          cd deploy-dir
          find . -maxdepth 1 ! -name '.' ! -name '.git' -exec rm -rf {} +
          
          # Copy new build output
          cp -r ../out/. .
          printf '%s\n' '---' 'deployment:' '  tasks:' '    - /bin/cp -rf /home/petrasky/repositories/czarkom/. /home/petrasky/public_html/czarkom/www/' > .cpanel.yml
          
          # Commit and push (normal push, no force)
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push origin deploy
