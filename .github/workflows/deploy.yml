name: Deploy to Production

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Deploy to deploy branch
        run: |
          cd out
          printf '%s\n' '---' 'deployment:' '  tasks:' '    - export DEPLOYPATH=/home/petrasky/public_html/czarkom/www/' '    - /bin/cp -r * "$DEPLOYPATH"' '    - /bin/cp .htaccess "$DEPLOYPATH" 2>/dev/null || true' > .cpanel.yml
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout -b deploy
          git add -A
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin deploy

      - name: Trigger cPanel deployment
        run: |
          curl -s -X POST \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControlDeployment/create" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
            --data-urlencode "repository_root=/home/${{ secrets.CPANEL_USER }}/repositories/czarkom" \
            | grep -q '"status":1' && echo "Deploy triggered OK" || echo "Deploy trigger failed"
